<article>
    <h1>🔍 Search The Daily Amen AI</h1>
    <p>Find reflections, prayers, and Catholic content.</p>

    <div class="search-container">
        <input type="text" id="search-input" placeholder="Search reflections, saints, prayers..." autofocus>
        <div id="search-results" class="search-results"></div>
        <div id="search-stats" class="search-stats"></div>
    </div>
</article>

<!-- Lunr.js Library -->
<script src="https://cdn.jsdelivr.net/npm/lunr@2.3.9/lunr.min.js"></script>

<script>
// Lunr.js Search Implementation
document.addEventListener('DOMContentLoaded', function() {
    const searchInput = document.getElementById('search-input');
    const searchResults = document.getElementById('search-results');
    const searchStats = document.getElementById('search-stats');
    let index = null;
    let documents = [];

    // Load search index
    fetch('{{ "/search.json" | relative_url }}')
        .then(response => response.json())
        .then(data => {
            documents = data;

            // Build Lunr index
            index = lunr(function() {
                this.ref('id');
                this.field('title', { boost: 10 });
                this.field('content', { boost: 1 });
                this.field('excerpt', { boost: 5 });
                this.field('categories', { boost: 3 });
                this.field('tags', { boost: 2 });

                for (let i = 0; i < data.length; i++) {
                    this.add(data[i]);
                }
            });

            searchStats.innerHTML = `📚 Indexed ${data.length} reflections`;
        })
        .catch(error => {
            console.error('Error loading search index:', error);
            searchStats.innerHTML = '❌ Error loading search';
        });

    // Search function
    searchInput.addEventListener('input', function() {
        const query = this.value.trim();

        if (query.length < 2) {
            searchResults.innerHTML = '';
            searchStats.innerHTML = query.length > 0 ? 'Type at least 2 characters...' : '';
            return;
        }

        if (!index) {
            searchStats.innerHTML = 'Loading search index...';
            return;
        }

        const results = index.search(query);

        if (results.length === 0) {
            searchResults.innerHTML = '<p class="no-results">No reflections found. Try different keywords.</p>';
            searchStats.innerHTML = `🔍 "${query}" - No results`;
            return;
        }

        // Display results
        let html = '';
        results.forEach(result => {
            const doc = documents.find(d => d.id === result.ref);
            if (doc) {
                const date = new Date(doc.date).toLocaleDateString('en-US', {
                    year: 'numeric', month: 'long', day: 'numeric'
                });
                const excerpt = doc.excerpt.length > 150 
                    ? doc.excerpt.substring(0, 150) + '...' 
                    : doc.excerpt;

                html += `
                <article class="search-result-item">
                    <h3><a href="${doc.url}">${highlightMatch(doc.title, query)}</a></h3>
                    <div class="search-meta">
                        <span class="search-date">📅 ${date}</span>
                        ${doc.categories.length > 0 ? `<span class="search-categories">${doc.categories.map(c => `<span class="category">${c}</span>`).join('')}</span>` : ''}
                    </div>
                    <p class="search-excerpt">${highlightMatch(excerpt, query)}</p>
                </article>
                `;
            }
        });

        searchResults.innerHTML = html;
        searchStats.innerHTML = `🔍 "${query}" - ${results.length} result${results.length !== 1 ? 's' : ''}`;
    });

    // Highlight matching text
    function highlightMatch(text, query) {
        const regex = new RegExp(`(${query})`, 'gi');
        return text.replace(regex, '<mark>$1</mark>');
    }
});
</script>
