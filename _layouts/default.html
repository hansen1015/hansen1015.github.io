<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
    <meta name="description" content="{{ site.description }}">
    <link rel="stylesheet" href="{{ "/assets/css/style.css" | relative_url }}">
    <link rel="alternate" type="application/rss+xml" title="{{ site.title }}" href="{{ "/feed.xml" | relative_url }}">
</head>
<body>
    <header>
        <nav>
            <a href="{{ "/" | relative_url }}">{{ site.title }}</a>
            <a href="{{ "/about/" | relative_url }}">About</a>
        </nav>
    </header>
    <main>
        {{ content }}
    </main>
    <footer>
        <p>&copy; {{ site.time | date: "%Y" }} {{ site.title }}. Daily reflections on faith, scripture, and life.</p>
        <p class="ai-disclosure-small">⚠️ <em>Content generated with AI assistance. Discern in prayer and light of Church teaching.</em></p>
    </footer>
</body>
</html>
